services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: hr_sqlserver
    environment:
      SA_PASSWORD: ${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd}
      ACCEPT_EULA: Y
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${MSSQL_SA_PASSWORD:-YourStrong@Passw0rd}\" -C -Q 'SELECT 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hr_backend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection:-Server=sqlserver,1433;Database=HrPortalDb;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;}
      - Jwt__Secret=${Jwt__Secret:-YourSuperSecretKeyAtLeast32CharactersLong!}
      - Jwt__Issuer=${Jwt__Issuer:-HrPortal}
      - Jwt__Audience=${Jwt__Audience:-HrPortalUsers}
      - Jwt__AccessTokenMinutes=${Jwt__AccessTokenMinutes:-15}
      - Jwt__RefreshTokenDays=${Jwt__RefreshTokenDays:-7}
      - CORS__AllowedOrigins__0=http://localhost:3000
      - CORS__AllowedOrigins__1=http://frontend
    ports:
      - "5000:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: hr_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: on-failure

volumes:
  sqldata:
    driver: local
